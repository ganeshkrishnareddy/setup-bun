name: 'Setup Bun'
description: 'Set up Bun runtime with automatic caching for faster CI/CD pipelines'
author: 'P Ganesh Krishna Reddy <pganeshkrishnareddy@gmail.com>'

branding:
  icon: 'zap'
  color: 'orange'

inputs:
  bun-version:
    description: 'Bun version to install (e.g., 1.3.14, latest, canary)'
    required: false
    default: 'latest'
  cache:
    description: 'Enable dependency caching (true/false)'
    required: false
    default: 'true'
  cache-key:
    description: 'Custom cache key prefix'
    required: false
    default: ''
  registry-url:
    description: 'npm registry URL for private packages'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for registry auth'
    required: false
    default: ''

outputs:
  bun-version:
    description: 'Installed Bun version'
    value: ${{ steps.version.outputs.version }}
  cache-hit:
    description: 'Whether cache was hit'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Get Bun Version
      id: version
      shell: bash
      run: |
        VERSION=$(bun --version)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Bun version: $VERSION"

    - name: Cache Bun Dependencies
      id: cache
      if: inputs.cache == 'true'
      shell: bash
      run: |
        CACHE_KEY="${{ inputs.cache-key }}"
        if [ -z "$CACHE_KEY" ]; then
          CACHE_KEY="bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}"
        fi
        
        CACHE_DIR="$HOME/.bun/install/cache"
        echo "CACHE_KEY=$CACHE_KEY" >> $GITHUB_OUTPUT
        
        if [ -d "$CACHE_DIR" ] && [ "$(ls -A $CACHE_DIR 2>/dev/null)" ]; then
          echo "cache-hit=true" >> $GITHUB_OUTPUT
          echo "Bun cache found"
        else
          echo "cache-hit=false" >> $GITHUB_OUTPUT
          echo "No Bun cache found"
        fi

    - name: Install Dependencies
      shell: bash
      run: |
        if [ -f "bun.lock" ]; then
          echo "Installing dependencies with bun install..."
          bun install --frozen-lockfile
        elif [ -f "package.json" ]; then
          echo "Installing dependencies with bun install..."
          bun install
        else
          echo "No package.json found, skipping install"
        fi

    - name: Setup Registry Auth
      if: inputs.registry-url != ''
      shell: bash
      env:
        REGISTRY_URL: ${{ inputs.registry-url }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "registry=$REGISTRY_URL" > .npmrc
        echo "//${REGISTRY_URL#https://}/:_authToken=$GITHUB_TOKEN" >> .npmrc
        echo "Registry auth configured"
